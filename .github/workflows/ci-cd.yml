name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Basic Test
      run: pytest test_app.py

    # Docker build
    - name: Build Image
      run: docker build -t your-dockerhub-username/ml-api .

    # Login to DockerHub
    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Push image
    - name: Push Image
      run: docker push your-dockerhub-username/ml-api